name: Deploy to Railway

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go (for potential build checks)
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Build
        run: go build ./...

      - name: Install Railway CLI
        run: npm -g i @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_NAME: ${{ secrets.RAILWAY_SERVICE_NAME }}
        run: |
          # Authenticate non-interactively
          railway login --token "$RAILWAY_TOKEN"
          # Link this directory to your project id (idempotent)
          railway link --project "$RAILWAY_PROJECT_ID"
          # Deploy this service from the repo (Railway reads Dockerfile)
          railway up --service "$RAILWAY_SERVICE_NAME" --ci

